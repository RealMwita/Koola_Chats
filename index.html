<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koola Chats Desktop</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body class="dark-theme">
    
    <!-- Splash Screen -->
    <div id="splash-screen" class="full-overlay">
        <div class="splash-content">
            <i class="ri-message-3-fill splash-logo pulse"></i>
            <h1 class="splash-title">Koola</h1>
        </div>
    </div>

    <!-- Auth / Onboarding Overlay -->
    <div id="auth-overlay" class="full-overlay hidden">
        <div class="auth-modal">
            <h2>Welcome to Koola</h2>
            <p>Sign in with your email to start messaging.</p>
            <div class="auth-form" id="login-form">
                <input type="email" id="auth-email" placeholder="Email Address">
                <input type="password" id="auth-password" placeholder="Password">
                <button id="auth-submit-btn" class="primary-btn">Sign In / Register</button>
            </div>
            <div id="auth-loader" class="hidden">
                <i class="ri-loader-4-line pulse" style="font-size: 32px;"></i>
                <p>Authenticating...</p>
            </div>
        </div>
    </div>

    <!-- Main Desktop Layout -->
    <div id="app-container" class="whatsapp-layout hidden">
        
        <!-- Column 1: Far Left Slim Sidebar -->
        <nav class="side-nav">
            <div class="nav-top">
                <button class="nav-icon active" data-tab="chats"><i class="ri-chat-3-fill"></i></button>
                <button class="nav-icon" data-tab="calls"><i class="ri-phone-fill"></i></button>
                <button class="nav-icon" data-tab="status"><i class="ri-donut-chart-fill"></i></button>
            </div>
            <div class="nav-bottom">
                <button class="nav-icon" id="settings-btn"><i class="ri-settings-4-fill"></i></button>
                <div class="nav-avatar-wrapper" id="profile-btn">
                    <div class="avatar-text" id="my-avatar-placeholder">U</div>
                </div>
            </div>
        </nav>

        <!-- Column 2: Middle Pane (List View) -->
        <aside class="list-pane border-right">
            <header class="pane-header">
                <h1 id="pane-title">Chats</h1>
                <div class="pane-actions">
                    <button class="icon-btn" id="new-chat-btn"><i class="ri-chat-new-line"></i></button>
                    <button class="icon-btn"><i class="ri-more-2-fill"></i></button>
                </div>
            </header>
            
            <div class="search-container">
                <div class="search-bar">
                    <i class="ri-search-line"></i>
                    <input type="text" id="global-search" placeholder="Search or start a new chat">
                </div>
                <div class="filter-chips">
                    <span class="chip active">All</span>
                    <span class="chip">Unread</span>
                    <span class="chip">Groups</span>
                </div>
            </div>

            <div id="main-content" class="scrollable-list">
                <!-- Chat List injected dynamically via ui.js -->
            </div>
        </aside>

        <!-- Column 3: Right Pane (Active Chat / Empty State) -->
        <main class="active-chat-pane">
            
            <!-- Default Empty State -->
            <div id="empty-state-view" class="empty-state">
                <div class="empty-state-content">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="App Logo" width="120" style="opacity: 0.3; filter: grayscale(1);">
                    <h1>Koola Web</h1>
                    <p>Send and receive messages without keeping your phone online.</p>
                    <p style="font-size: 13px; opacity: 0.6; margin-top: 10px;"><i class="ri-lock-2-line"></i> End-to-end encrypted protocol</p>
                </div>
            </div>

            <!-- Active Messaging Engine -->
            <div id="messaging-container" class="messaging-view hidden">
                <!-- Messaging Header, Bubbles, and Input injected dynamically -->
            </div>

            <!-- Subpage overlay for settings/profile in desktop mode opens here or modal -->
            <div id="subpage-container" class="subpage-overlay hidden" style="position: absolute; top:0; left:0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 50; display: flex; flex-direction: column;">
                <header class="chat-header">
                    <div class="chat-header-info" onclick="document.getElementById('subpage-container').classList.add('hidden')">
                        <i class="ri-arrow-left-line" style="font-size: 20px;"></i>
                        <h2 style="font-weight: 500; font-size: 18px; margin-left: 12px;">Settings</h2>
                    </div>
                </header>
                <div style="padding: 32px; overflow-y: auto;">
                    <div style="text-align: center; margin-bottom: 32px;">
                        <div class="avatar-text" style="width: 100px; height: 100px; font-size: 40px; margin: 0 auto 16px;" id="settings-avatar">U</div>
                        <h2 id="settings-name" style="font-size: 24px;">Name</h2>
                        <p id="settings-email" style="color: var(--text-secondary); margin-top: 8px;">email@example.com</p>
                    </div>
                    <div style="background: var(--sidebar-bg); border-radius: 12px; padding: 16px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; cursor: pointer; padding: 8px 0;" id="theme-toggle-btn">
                            <div style="display: flex; align-items: center; gap: 16px;">
                                <i class="ri-moon-fill" style="font-size: 20px; color: var(--text-secondary);"></i>
                                <span style="font-size: 16px;">Dark Mode</span>
                            </div>
                            <i class="ri-toggle-fill" style="font-size: 32px; color: var(--primary-green);" id="theme-toggle-icon"></i>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts Modular Architecture -->
    <script>
        // Init theme instantly before DOM load to prevent flash
        if(localStorage.getItem('koola_theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>
    <script type="module" src="js/firebase-init.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/webrtc.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
